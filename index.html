<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨韵AI - 智能小说创作</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">📝</div>
            <span class="brand-name">墨韵AI</span>
            <span class="brand-sub">智能创作工作台</span>
        </div>
        <div class="header-right">
            <button class="settings-btn" onclick="openSettingsModal()" title="设置">⚙️</button>
            <select class="theme-select" onchange="toggleTheme()">
                <option value="dark">暗色系</option>
                <option value="light">亮色系</option>
            </select>
            <div class="user-info">
                <div class="user-avatar">Y</div>
                <span class="user-name">yyy</span>
            </div>
            <span class="logout-icon">↩</span>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Welcome Section -->
        <section class="welcome-section" id="welcomeSection">
            <div class="welcome-text">
                <h1 id="greetingText">晚上好，yyy</h1>
                <p>开始你的创作之旅吧！让AI陪你完成你的小说作品。</p>
            </div>
            <button class="btn-primary" onclick="openNewNovelModal()">
                <span>+</span> 新建小说
            </button>
        </section>

        <!-- Stats Section -->
        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-icon purple">📚</div>
                <div class="stat-info">
                    <h3 id="novelCount">0</h3>
                    <p>小说项目</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon teal">📖</div>
                <div class="stat-info">
                    <h3 id="chapterCount">0</h3>
                    <p>总章节</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon gold">✍️</div>
                <div class="stat-info">
                    <h3 id="wordCount">0</h3>
                    <p>总字数</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon pink">👥</div>
                <div class="stat-info">
                    <h3 id="charCount">0</h3>
                    <p>总角色</p>
                </div>
            </div>
        </section>

        <!-- Project Section - Dashboard View -->
        <section class="project-section" id="projectSection">
            <div class="project-header">
                <h2 class="project-title">我的小说 <span id="projectCount">(0)</span></h2>
                <div class="project-toolbar">
                    <button class="toolbar-btn">
                        <span>🔍</span> 搜索
                    </button>
                    <button class="toolbar-btn">
                        <span>📁</span> 类型
                    </button>
                    <button class="toolbar-btn">
                        <span>📅</span> 时间
                    </button>
                    <button class="toolbar-btn active">
                        <span>⊞</span>
                    </button>
                    <button class="toolbar-btn">
                        <span>☰</span>
                    </button>
                    <button class="new-btn" onclick="openNewNovelModal()">
                        <span>+</span> 新建
                    </button>
                </div>
            </div>

            <div class="novel-grid" id="novelGrid">
                <!-- Novel cards will be rendered here -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📚</div>
                <h3>还没有创建小说项目</h3>
                <p>开始创作你的第一部小说作品吧</p>
                <button class="btn-primary" onclick="openNewNovelModal()">
                    开始创作
                </button>
            </div>
        </section>

        <!-- Editor View -->
        <section class="editor-view" id="editorView">
            <div class="editor-header">
                <div class="back-btn" onclick="goBack()">
                    <span>←</span> 返回
                </div>
                <h2 class="editor-title" id="editorTitle">第1章 · 章节标题</h2>
                <div class="editor-actions">
                    <button class="action-btn">
                        <span>💾</span> 保存
                    </button>
                    <button class="action-btn" onclick="exportCurrentProject()">
                        <span>📤</span> 导出
                    </button>
                </div>
            </div>

            <div class="editor-container">
                <aside class="chapter-sidebar">
                    <h3>章节目录</h3>
                    <div class="chapter-list" id="chapterList">
                        <!-- Chapter items will be rendered here -->
                    </div>
                    <button class="add-chapter-btn" onclick="openAddChapterModal()">
                        <span>+</span> 添加章节
                    </button>
                </aside>

                <div class="content-area">
                    <textarea class="content-textarea" id="contentEditor" placeholder="在这里开始你的创作..."></textarea>
                    <div class="content-toolbar">
                        <button class="toolbar-btn primary" onclick="aiWrite()">
                            ✍️ AI续写
                        </button>
                        <button class="toolbar-btn" onclick="aiPolish()">
                            🎨 AI润色
                        </button>
                        <button class="toolbar-btn" onclick="aiImprove()">
                            💡 AI建议
                        </button>
                    </div>
                    <div class="word-count-bar">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <span id="currentWordCount">0 字</span>
                            <span class="ai-status" id="aiStatus"></span>
                        </div>
                        <span>自动保存已开启</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      更新了些新BUG，额....是新功能 ✨
    </footer>

    <!-- New Novel Modal -->
    <div class="modal-overlay" id="newNovelModal">
        <div class="modal">
            <h3 class="modal-title">创建新小说</h3>
            <div class="form-group">
                <label class="form-label">小说标题</label>
                <input type="text" class="form-input" id="novelTitleInput" placeholder="请输入小说标题">
            </div>
            <div class="form-group">
                <label class="form-label">题材类型</label>
                <select class="form-select" id="novelTypeSelect">
                    <option value="romance">💕 言情</option>
                    <option value="fantasy">🔮 玄幻</option>
                    <option value="mystery">🔍 悬疑</option>
                    <option value="scifi">🚀 科幻</option>
                    <option value="wuxia">⚔️ 武侠</option>
                    <option value="urban">🏙️ 都市</option>
                    <option value="historical">🏯 历史</option>
                    <option value="horror">👻 恐怖</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">简介</label>
                <textarea class="form-input" id="novelDescInput" placeholder="请输入小说简介" rows="3"></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeNewNovelModal()">取消</button>
                <button class="modal-btn confirm" onclick="createNovel()">创建</button>
            </div>
        </div>
    </div>

    <!-- Add Chapter Modal -->
    <div class="modal-overlay" id="addChapterModal">
        <div class="modal">
            <h3 class="modal-title">添加章节</h3>
            <div class="form-group">
                <label class="form-label">章节标题</label>
                <input type="text" class="form-input" id="chapterTitleInput" placeholder="请输入章节标题">
            </div>
            <div class="form-group">
                <label class="form-label">章节简介（可选）</label>
                <textarea class="form-input" id="chapterDescInput" placeholder="请输入章节简介" rows="2"></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeAddChapterModal()">取消</button>
                <button class="modal-btn confirm" onclick="addChapter()">添加</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h3 class="modal-title">⚙️ AI设置</h3>

            <div class="form-group">
                <label class="form-label">API Provider</label>
                <select class="form-select" id="apiProvider" onchange="onApiProviderChange()">
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="openai">OpenAI (GPT)</option>
                    <option value="custom">自定义 API</option>
                    <option value="local">本地模拟</option>
                </select>
            </div>

            <div class="form-group" id="apiKeyGroup">
                <label class="form-label">API Key</label>
                <input type="password" class="form-input" id="apiKeyInput" placeholder="请输入API Key">
            </div>

            <div class="form-group" id="baseUrlGroup">
                <label class="form-label">Base URL</label>
                <input type="text" class="form-input" id="baseUrlInput" placeholder="https://api.anthropic.com">
            </div>

            <div class="form-group" id="modelGroup">
                <label class="form-label">Model</label>
                <select class="form-select" id="modelSelect">
                    <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
                    <option value="claude-opus-4-20250514">Claude Opus 4</option>
                    <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Max Tokens</label>
                <input type="number" class="form-input" id="maxTokensInput" value="2048" min="256" max="8192">
            </div>

            <div class="form-group">
                <label class="form-label">Temperature</label>
                <input type="range" class="form-input" id="temperatureInput" value="0.7" min="0" max="1" step="0.1" style="padding: 0;">
                <span id="temperatureValue" style="color: var(--text-secondary); font-size: 0.85rem; margin-left: 0.5rem;">0.7</span>
            </div>

            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeSettingsModal()">取消</button>
                <button class="modal-btn confirm" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
