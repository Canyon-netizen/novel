<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F8F6F1" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1A1815" media="(prefers-color-scheme: dark)">
    <title>一页 - 智能小说创作</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="page-header">
        <a href="index.html" class="page-logo">
            <div class="page-logo__dot">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>
            <span>一页</span>
        </a>
        <div class="page-header__right">
            <button class="settings-btn" onclick="openSettingsModal()" title="设置" aria-label="设置">⚙</button>
            <div id="themeToggle"></div>
            <div class="user-info">
                <div class="user-avatar"></div>
                <span class="user-name"></span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Light welcome strip -->
        <div class="welcome-strip" id="welcomeStrip">晚上好，yyy</div>

        <!-- Stats Section -->
        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24"><path d="M4 4h12a2 2 0 0 1 2 2v14H6a2 2 0 0 1-2-2V4z"/><path d="M18 20H4"/></svg>
                </div>
                <div class="stat-info">
                    <h3 id="novelCount">0</h3>
                    <p>小说项目</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24"><path d="M4 19V5a2 2 0 0 1 2-2h12v18H6a2 2 0 0 1-2-2z"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="14" y2="13"/></svg>
                </div>
                <div class="stat-info">
                    <h3 id="chapterCount">0</h3>
                    <p>总章节</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7H12v-3z"/><path d="M18 13L8 23H5v-3L15 3l3 3z"/></svg>
                </div>
                <div class="stat-info">
                    <h3 id="wordCount">0</h3>
                    <p>总字数</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><circle cx="17" cy="11" r="3"/><path d="M3 21v-2a4 4 0 0 1 4-4h4"/><path d="M14 21v-1a3 3 0 0 1 3-3h1"/></svg>
                </div>
                <div class="stat-info">
                    <h3 id="charCount">0</h3>
                    <p>总角色</p>
                </div>
            </div>
        </section>

        <!-- Recent writing -->
        <section class="recent-section" id="recentSection">
            <h2 class="section-title">最近写作</h2>
            <div class="recent-grid" id="recentGrid"></div>
        </section>

        <!-- Project Section -->
        <section class="project-section" id="projectSection">
            <div class="project-header">
                <h2 class="section-title">我的小说 <span id="projectCount">(0)</span></h2>
                <div class="toolbar">
                    <button class="btn-secondary" onclick="toggleSearch()" title="搜索" aria-label="搜索">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.5" y2="16.5"/></svg>
                    </button>
                    <button class="btn-secondary" onclick="toggleFilter('type')" title="类型" aria-label="类型">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5h18M3 12h18M3 19h18"/></svg>
                    </button>
                    <button class="btn-secondary" onclick="toggleFilter('time')" title="时间" aria-label="时间">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
                    </button>
                    <button class="btn-secondary" id="gridViewBtn" onclick="setView('grid')" title="网格" aria-label="网格">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    </button>
                    <button class="btn-secondary" id="listViewBtn" onclick="setView('list')" title="列表" aria-label="列表">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    </button>
                    <button class="btn-primary" onclick="openNewNovelModal()">+ 新建</button>
                </div>
            </div>

            <div id="searchBar" style="display: none; margin-bottom: 1rem;">
                <input type="text" class="form-input" id="searchInput" placeholder="搜索项目..." oninput="filterProjects()">
            </div>

            <div id="filterPanel" style="display: none; margin-bottom: 1rem; padding: 1rem; background: var(--bg-secondary); border-radius: 8px;">
                <div id="filterContent"></div>
            </div>

            <div class="novel-grid" id="novelGrid"></div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <h3>还没有创建小说项目</h3>
                <p>开始创作你的第一部小说作品吧</p>
                <button class="btn-primary" onclick="openNewNovelModal()">开始创作</button>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      &nbsp;
    </footer>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal" onclick="closeSettingsModalOnOverlay(event)">
        <div class="modal settings-modal">
            <div class="modal-header">
                <h3 class="modal-title">⚙️ AI设置</h3>
                <button class="modal-close" onclick="closeSettingsModal()">&times;</button>
            </div>

            <div class="settings-content">
                <!-- Left Column - Main Settings -->
                <div class="settings-main">
                    <div class="settings-section">
                        <div class="settings-section-title">
                            <span class="settings-section-icon">🔑</span>
                            API 配置
                        </div>
                        <div class="form-group">
                            <label class="form-label">Provider</label>
                            <select class="form-select" id="apiProvider" onchange="onApiProviderChange()">
                                <option value="anthropic">Anthropic (Claude)</option>
                                <option value="openai">OpenAI (GPT)</option>
                                <option value="deepseek">DeepSeek</option>
                                <option value="minimax">MiniMax</option>
                                <option value="custom">自定义 API</option>
                                <option value="local">本地模拟</option>
                            </select>
                        </div>
                        <div class="form-group" id="apiKeyGroup">
                            <label class="form-label">API Key</label>
                            <input type="password" class="form-input" id="apiKeyInput" placeholder="请输入API Key">
                        </div>
                        <div class="form-group" id="baseUrlGroup">
                            <label class="form-label">Base URL</label>
                            <input type="text" class="form-input" id="baseUrlInput" placeholder="https://api.anthropic.com">
                        </div>
                        <div class="form-group" id="modelGroup">
                            <label class="form-label">Model</label>
                            <input type="text" class="form-input" id="modelInput" placeholder="输入模型名称，如：claude-sonnet-4-20250514">
                        </div>
                    </div>

                    <div class="settings-section">
                        <div class="settings-section-title">
                            <span class="settings-section-icon">🎛️</span>
                            生成参数
                        </div>
                        <div class="form-group">
                            <label class="form-label">Temperature</label>
                            <div class="slider-with-value">
                                <input type="range" id="temperatureInput" value="0.7" min="0" max="1" step="0.1">
                                <span class="slider-value" id="temperatureValue">0.7</span>
                            </div>
                            <div class="slider-labels">
                                <span>精确</span>
                                <span>创意</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column - Quick Actions & Status -->
                <div class="settings-side">
                    <div class="settings-section">
                        <div class="settings-section-title">
                            <span class="settings-section-icon">⚡</span>
                            连接测试
                        </div>
                        <button class="btn-test" id="testBtn" onclick="testApiConnection()">
                            <span class="btn-icon">🔗</span>
                            测试连接
                        </button>
                    </div>

                    <div class="settings-section">
                        <div class="settings-section-title">
                            <span class="settings-section-icon">☁️</span>
                            数据同步
                        </div>
                        <div class="form-group">
                            <label class="form-label">GitHub Token</label>
                            <input type="password" class="form-input" id="githubTokenInput" placeholder="请输入 GitHub Token">
                            <p class="form-hint">
                                需要勾选 gist 权限 <a href="https://github.com/settings/tokens/new?scopes=gist" target="_blank">创建 Token</a>
                            </p>
                        </div>
                        <div id="gistStatus" class="gist-status">
                            <span id="gistStatusText"></span>
                        </div>
                        <div class="btn-group">
                            <button class="btn-secondary" onclick="connectGist()">连接 Gist</button>
                            <button class="btn-secondary" id="syncBtn" onclick="syncToGist()" disabled>同步</button>
                        </div>
                        <button class="btn-load" onclick="loadFromGist()" id="loadFromGistBtn">从 Gist 加载</button>
                        <label class="gist-auto-sync" style="display:flex;align-items:center;gap:6px;margin-top:8px;font-size:0.85rem;color:var(--text-secondary);cursor:pointer;">
                            <input type="checkbox" id="autoSyncCheckbox" onchange="toggleAutoSync(this.checked)">
                            <span>数据变更后自动同步到 Gist（5 秒延迟）</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeSettingsModal()">取消</button>
                <button class="modal-btn confirm" onclick="saveSettings()">保存设置</button>
            </div>
        </div>
    </div>

    <script src="app/common.js"></script>
    <script src="app/llm-client.js"></script>
    <script src="app/autosave.js"></script>
    <script src="app/undo-stack.js"></script>
    <script src="app/writing-stats.js"></script>
    <script src="app/inspiration.js"></script>
    <script src="app/exporter.js"></script>
    <script src="app/settings-test.js"></script>
    <script src="js/theme-toggle.js"></script>
<script src="js/states.js"></script>
<script src="js/shortcuts.js"></script>
<script src="js/auto-sync.js"></script>
<script src="js/app.js"></script>
</body>
</html>
