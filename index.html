<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨韵AI - 智能小说创作</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0D0D0D;
            --bg-secondary: #141414;
            --bg-card: #1A1A1A;
            --bg-card-hover: #222222;
            --text-primary: #FFFFFF;
            --text-secondary: #888888;
            --text-muted: #555555;
            --accent-blue: #3B82F6;
            --accent-blue-hover: #2563EB;
            --accent-purple: #8B5CF6;
            --accent-teal: #14B8A6;
            --accent-gold: #F59E0B;
            --accent-pink: #EC4899;
            --border-color: #2A2A2A;
            --border-radius: 12px;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .brand-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .brand-sub {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-left: 0.5rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .settings-btn {
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .settings-btn:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .theme-select {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-teal) 0%, var(--accent-blue) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .user-name {
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .logout-icon {
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        .logout-icon:hover {
            color: var(--accent-pink);
        }

        /* Main Container */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Welcome Section */
        .welcome-section {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: var(--border-radius);
            padding: 2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .welcome-text h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .welcome-text p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .btn-primary {
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, var(--accent-blue) 0%, #2563EB 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        /* Stats Section */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-icon.purple { background: rgba(139, 92, 246, 0.15); }
        .stat-icon.teal { background: rgba(20, 184, 166, 0.15); }
        .stat-icon.gold { background: rgba(245, 158, 11, 0.15); }
        .stat-icon.pink { background: rgba(236, 72, 153, 0.15); }

        .stat-info h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }

        .stat-info p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Project Section */
        .project-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 1.5rem;
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .project-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .project-title span {
            color: var(--text-secondary);
            font-weight: 400;
            margin-left: 0.5rem;
        }

        .project-toolbar {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .toolbar-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.3s;
        }

        .toolbar-btn:hover {
            border-color: var(--accent-blue);
        }

        .toolbar-btn.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .new-btn {
            padding: 0.5rem 1.2rem;
            background: linear-gradient(135deg, var(--accent-blue) 0%, #2563EB 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.3s;
        }

        .new-btn:hover {
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        /* Novel Grid */
        .novel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .novel-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .novel-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .novel-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .novel-type {
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);
        }

        .novel-menu {
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .novel-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .novel-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .novel-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .novel-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .empty-state p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .form-select {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .modal-btn {
            flex: 1;
            padding: 0.8rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn.cancel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, var(--accent-blue) 0%, #2563EB 100%);
            color: white;
            border: none;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
        }

        /* Editor View */
        .editor-view {
            display: none;
        }

        .editor-view.active {
            display: block;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--text-primary);
        }

        .editor-title {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .editor-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.3s;
        }

        .action-btn:hover {
            border-color: var(--accent-blue);
        }

        .editor-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 1.5rem;
        }

        .chapter-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 1rem;
            height: calc(100vh - 200px);
            overflow-y: auto;
        }

        .chapter-sidebar h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .chapter-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .chapter-item {
            padding: 0.8rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .chapter-item:hover {
            border-color: var(--accent-blue);
        }

        .chapter-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .add-chapter-btn {
            width: 100%;
            padding: 0.8rem;
            background: transparent;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .add-chapter-btn:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .content-area {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 2rem;
            height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
        }

        .content-textarea {
            flex: 1;
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1.1rem;
            line-height: 2;
            resize: none;
        }

        .content-textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .content-textarea::placeholder {
            color: var(--text-muted);
        }

        .content-toolbar {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .toolbar-btn {
            padding: 0.6rem 1.2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.3s;
        }

        .toolbar-btn:hover {
            border-color: var(--accent-blue);
        }

        .toolbar-btn.primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, #2563EB 100%);
            color: white;
            border: none;
        }

        .form-group label.form-label + input[type="range"] {
            margin-top: 0.5rem;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent-blue);
            border-radius: 50%;
            cursor: pointer;
        }

        .form-input[type="range"] {
            padding: 0;
            background: transparent;
            border: none;
        }

        .word-count-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .ai-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--accent-teal);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        @media (max-width: 1024px) {
            .stats-section {
                grid-template-columns: repeat(2, 1fr);
            }
            .editor-container {
                grid-template-columns: 1fr;
            }
            .chapter-sidebar {
                height: auto;
                max-height: 300px;
            }
        }

        @media (max-width: 768px) {
            .welcome-section {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }
            .project-header {
                flex-direction: column;
                gap: 1rem;
            }
            .stats-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">📝</div>
            <span class="brand-name">墨韵AI</span>
            <span class="brand-sub">智能创作工作台</span>
        </div>
        <div class="header-right">
            <button class="settings-btn" onclick="openSettingsModal()" title="设置">⚙️</button>
            <select class="theme-select">
                <option value="dark">暗色系</option>
                <option value="light">亮色系</option>
            </select>
            <div class="user-info">
                <div class="user-avatar">Y</div>
                <span class="user-name">yyy</span>
            </div>
            <span class="logout-icon">↩</span>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Welcome Section -->
        <section class="welcome-section" id="welcomeSection">
            <div class="welcome-text">
                <h1 id="greetingText">晚上好，yyy</h1>
                <p>开始你的创作之旅吧！让AI陪你完成你的小说作品。</p>
            </div>
            <button class="btn-primary" onclick="openNewNovelModal()">
                <span>+</span> 新建小说
            </button>
        </section>

        <!-- Stats Section -->
        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-icon purple">📚</div>
                <div class="stat-info">
                    <h3 id="novelCount">0</h3>
                    <p>小说项目</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon teal">📖</div>
                <div class="stat-info">
                    <h3 id="chapterCount">0</h3>
                    <p>总章节</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon gold">✍️</div>
                <div class="stat-info">
                    <h3 id="wordCount">0</h3>
                    <p>总字数</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon pink">👥</div>
                <div class="stat-info">
                    <h3 id="charCount">0</h3>
                    <p>总角色</p>
                </div>
            </div>
        </section>

        <!-- Project Section - Dashboard View -->
        <section class="project-section" id="projectSection">
            <div class="project-header">
                <h2 class="project-title">我的小说 <span id="projectCount">(0)</span></h2>
                <div class="project-toolbar">
                    <button class="toolbar-btn">
                        <span>🔍</span> 搜索
                    </button>
                    <button class="toolbar-btn">
                        <span>📁</span> 类型
                    </button>
                    <button class="toolbar-btn">
                        <span>📅</span> 时间
                    </button>
                    <button class="toolbar-btn active">
                        <span>⊞</span>
                    </button>
                    <button class="toolbar-btn">
                        <span>☰</span>
                    </button>
                    <button class="new-btn" onclick="openNewNovelModal()">
                        <span>+</span> 新建
                    </button>
                </div>
            </div>

            <div class="novel-grid" id="novelGrid">
                <!-- Novel cards will be rendered here -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📚</div>
                <h3>还没有创建小说项目</h3>
                <p>开始创作你的第一部小说作品吧</p>
                <button class="btn-primary" onclick="openNewNovelModal()">
                    开始创作
                </button>
            </div>
        </section>

        <!-- Editor View -->
        <section class="editor-view" id="editorView">
            <div class="editor-header">
                <div class="back-btn" onclick="goBack()">
                    <span>←</span> 返回
                </div>
                <h2 class="editor-title" id="editorTitle">第1章 · 章节标题</h2>
                <div class="editor-actions">
                    <button class="action-btn">
                        <span>💾</span> 保存
                    </button>
                    <button class="action-btn">
                        <span>📤</span> 导出
                    </button>
                </div>
            </div>

            <div class="editor-container">
                <aside class="chapter-sidebar">
                    <h3>章节目录</h3>
                    <div class="chapter-list" id="chapterList">
                        <!-- Chapter items will be rendered here -->
                    </div>
                    <button class="add-chapter-btn" onclick="openAddChapterModal()">
                        <span>+</span> 添加章节
                    </button>
                </aside>

                <div class="content-area">
                    <textarea class="content-textarea" id="contentEditor" placeholder="在这里开始你的创作..."></textarea>
                    <div class="content-toolbar">
                        <button class="toolbar-btn primary" onclick="aiWrite()">
                            ✍️ AI续写
                        </button>
                        <button class="toolbar-btn" onclick="aiPolish()">
                            🎨 AI润色
                        </button>
                        <button class="toolbar-btn" onclick="aiImprove()">
                            💡 AI建议
                        </button>
                    </div>
                    <div class="word-count-bar">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <span id="currentWordCount">0 字</span>
                            <span class="ai-status" id="aiStatus"></span>
                        </div>
                        <span>自动保存已开启</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      更新了些新BUG，额....是新功能 ✨
    </footer>

    <!-- New Novel Modal -->
    <div class="modal-overlay" id="newNovelModal">
        <div class="modal">
            <h3 class="modal-title">创建新小说</h3>
            <div class="form-group">
                <label class="form-label">小说标题</label>
                <input type="text" class="form-input" id="novelTitleInput" placeholder="请输入小说标题">
            </div>
            <div class="form-group">
                <label class="form-label">题材类型</label>
                <select class="form-select" id="novelTypeSelect">
                    <option value="romance">💕 言情</option>
                    <option value="fantasy">🔮 玄幻</option>
                    <option value="mystery">🔍 悬疑</option>
                    <option value="scifi">🚀 科幻</option>
                    <option value="wuxia">⚔️ 武侠</option>
                    <option value="urban">🏙️ 都市</option>
                    <option value="historical">🏯 历史</option>
                    <option value="horror">👻 恐怖</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">简介</label>
                <textarea class="form-input" id="novelDescInput" placeholder="请输入小说简介" rows="3"></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeNewNovelModal()">取消</button>
                <button class="modal-btn confirm" onclick="createNovel()">创建</button>
            </div>
        </div>
    </div>

    <!-- Add Chapter Modal -->
    <div class="modal-overlay" id="addChapterModal">
        <div class="modal">
            <h3 class="modal-title">添加章节</h3>
            <div class="form-group">
                <label class="form-label">章节标题</label>
                <input type="text" class="form-input" id="chapterTitleInput" placeholder="请输入章节标题">
            </div>
            <div class="form-group">
                <label class="form-label">章节简介（可选）</label>
                <textarea class="form-input" id="chapterDescInput" placeholder="请输入章节简介" rows="2"></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeAddChapterModal()">取消</button>
                <button class="modal-btn confirm" onclick="addChapter()">添加</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h3 class="modal-title">⚙️ AI设置</h3>

            <div class="form-group">
                <label class="form-label">API Provider</label>
                <select class="form-select" id="apiProvider" onchange="onApiProviderChange()">
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="openai">OpenAI (GPT)</option>
                    <option value="local">本地模拟</option>
                </select>
            </div>

            <div class="form-group" id="apiKeyGroup">
                <label class="form-label">API Key</label>
                <input type="password" class="form-input" id="apiKeyInput" placeholder="请输入API Key">
            </div>

            <div class="form-group" id="baseUrlGroup">
                <label class="form-label">Base URL（可选）</label>
                <input type="text" class="form-input" id="baseUrlInput" placeholder="https://api.anthropic.com">
            </div>

            <div class="form-group" id="modelGroup">
                <label class="form-label">Model</label>
                <select class="form-select" id="modelSelect" style="background: var(--bg-secondary);">
                    <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
                    <option value="claude-opus-4-20250514">Claude Opus 4</option>
                    <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4-turbo">GPT-4 Turbo</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Max Tokens</label>
                <input type="number" class="form-input" id="maxTokensInput" value="2048" min="256" max="8192">
            </div>

            <div class="form-group">
                <label class="form-label">Temperature</label>
                <input type="range" class="form-input" id="temperatureInput" value="0.7" min="0" max="1" step="0.1" style="padding: 0;">
                <span id="temperatureValue" style="color: var(--text-secondary); font-size: 0.85rem; margin-left: 0.5rem;">0.7</span>
            </div>

            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeSettingsModal()">取消</button>
                <button class="modal-btn confirm" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // Data
        let projects = [];
        let currentProjectIndex = -1;
        let currentChapterIndex = -1;

        // AI Settings
        let aiSettings = {
            provider: 'anthropic',
            apiKey: '',
            baseUrl: '',
            model: 'claude-sonnet-4-20250514',
            maxTokens: 2048,
            temperature: 0.7
        };

        // Initialize
        function init() {
            loadProjects();
            loadSettings();
            updateGreeting();
            renderProjects();
            updateStats();
            updateAIStatus();
        }

        function loadProjects() {
            const saved = localStorage.getItem('moyun_projects');
            if (saved) {
                projects = JSON.parse(saved);
            }
        }

        function saveProjects() {
            localStorage.setItem('moyun_projects', JSON.stringify(projects));
        }

        // Settings Functions
        function loadSettings() {
            const saved = localStorage.getItem('moyun_ai_settings');
            if (saved) {
                try {
                    aiSettings = JSON.parse(saved);
                } catch (e) {}
            }
        }

        function saveSettingsToStorage() {
            localStorage.setItem('moyun_ai_settings', JSON.stringify(aiSettings));
        }

        function openSettingsModal() {
            document.getElementById('settingsModal').classList.add('show');
            document.getElementById('apiProvider').value = aiSettings.provider;
            document.getElementById('apiKeyInput').value = aiSettings.apiKey;
            document.getElementById('baseUrlInput').value = aiSettings.baseUrl;
            document.getElementById('modelSelect').value = aiSettings.model;
            document.getElementById('maxTokensInput').value = aiSettings.maxTokens;
            document.getElementById('temperatureInput').value = aiSettings.temperature;
            document.getElementById('temperatureValue').textContent = aiSettings.temperature;
            onApiProviderChange();
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('show');
        }

        function onApiProviderChange() {
            const provider = document.getElementById('apiProvider').value;
            const keyGroup = document.getElementById('apiKeyGroup');
            const urlGroup = document.getElementById('baseUrlGroup');
            const modelGroup = document.getElementById('modelGroup');

            if (provider === 'local') {
                keyGroup.style.display = 'none';
                urlGroup.style.display = 'none';
            } else {
                keyGroup.style.display = 'block';
                urlGroup.style.display = 'block';
            }

            // Update model options based on provider
            const modelSelect = document.getElementById('modelSelect');
            if (provider === 'anthropic') {
                modelSelect.innerHTML = `
                    <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
                    <option value="claude-opus-4-20250514">Claude Opus 4</option>
                    <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
                `;
            } else if (provider === 'openai') {
                modelSelect.innerHTML = `
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4-turbo">GPT-4 Turbo</option>
                    <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                `;
            }
        }

        document.getElementById('temperatureInput').addEventListener('input', function() {
            document.getElementById('temperatureValue').textContent = this.value;
        });

        function saveSettings() {
            aiSettings.provider = document.getElementById('apiProvider').value;
            aiSettings.apiKey = document.getElementById('apiKeyInput').value;
            aiSettings.baseUrl = document.getElementById('baseUrlInput').value;
            aiSettings.model = document.getElementById('modelSelect').value;
            aiSettings.maxTokens = parseInt(document.getElementById('maxTokensInput').value);
            aiSettings.temperature = parseFloat(document.getElementById('temperatureInput').value);

            saveSettingsToStorage();
            closeSettingsModal();
            updateAIStatus();
            alert('设置已保存！');
        }

        function updateAIStatus() {
            const status = document.getElementById('aiStatus');
            if (aiSettings.provider === 'local') {
                status.textContent = '📍 本地模式';
            } else if (aiSettings.apiKey) {
                status.textContent = '✅ ' + aiSettings.provider.toUpperCase();
            } else {
                status.textContent = '⚠️ 未配置API';
            }
        }

        function updateGreeting() {
            const hour = new Date().getHours();
            let greeting = '晚上好';
            if (hour >= 5 && hour < 12) greeting = '早上好';
            else if (hour >= 12 && hour < 18) greeting = '下午好';

            const saved = localStorage.getItem('moyun_user_name');
            const name = saved || 'yyy';

            document.getElementById('greetingText').textContent = `${greeting}，${name}`;
        }

        // Render Functions
        function renderProjects() {
            const grid = document.getElementById('novelGrid');
            const empty = document.getElementById('emptyState');
            const count = document.getElementById('projectCount');

            count.textContent = `(${projects.length})`;

            if (projects.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';

            grid.innerHTML = projects.map((project, index) => `
                <div class="novel-card" onclick="openProject(${index})">
                    <div class="novel-card-header">
                        <span class="novel-type">${getTypeName(project.type)}</span>
                        <span class="novel-menu">⋮</span>
                    </div>
                    <h3 class="novel-title">${project.title}</h3>
                    <p class="novel-desc">${project.description || '暂无简介'}</p>
                    <div class="novel-meta">
                        <span>📖 ${project.chapters.length}章</span>
                        <span>✍️ ${getProjectWordCount(project)}字</span>
                    </div>
                </div>
            `).join('');
        }

        function getTypeName(type) {
            const types = {
                romance: '言情',
                fantasy: '玄幻',
                mystery: '悬疑',
                scifi: '科幻',
                wuxia: '武侠',
                urban: '都市',
                historical: '历史',
                horror: '恐怖'
            };
            return types[type] || '其他';
        }

        function getProjectWordCount(project) {
            return project.chapters.reduce((sum, ch) => sum + (ch.content?.length || 0), 0);
        }

        function updateStats() {
            const totalNovels = projects.length;
            const totalChapters = projects.reduce((sum, p) => sum + p.chapters.length, 0);
            const totalWords = projects.reduce((sum, p) => sum + getProjectWordCount(p), 0);
            const totalChars = projects.reduce((sum, p) => sum + (p.characters?.length || 0), 0);

            document.getElementById('novelCount').textContent = totalNovels;
            document.getElementById('chapterCount').textContent = totalChapters;
            document.getElementById('wordCount').textContent = totalWords;
            document.getElementById('charCount').textContent = totalChars;
        }

        // Modal Functions
        function openNewNovelModal() {
            document.getElementById('newNovelModal').classList.add('show');
            document.getElementById('novelTitleInput').value = '';
            document.getElementById('novelDescInput').value = '';
        }

        function closeNewNovelModal() {
            document.getElementById('newNovelModal').classList.remove('show');
        }

        function openAddChapterModal() {
            document.getElementById('addChapterModal').classList.add('show');
            document.getElementById('chapterTitleInput').value = '';
            document.getElementById('chapterDescInput').value = '';
        }

        function closeAddChapterModal() {
            document.getElementById('addChapterModal').classList.remove('show');
        }

        // CRUD Functions
        function createNovel() {
            const title = document.getElementById('novelTitleInput').value.trim();
            const type = document.getElementById('novelTypeSelect').value;
            const description = document.getElementById('novelDescInput').value.trim();

            if (!title) {
                alert('请输入小说标题');
                return;
            }

            projects.push({
                title,
                type,
                description,
                chapters: [],
                characters: [],
                createdAt: new Date().toISOString()
            });

            saveProjects();
            renderProjects();
            updateStats();
            closeNewNovelModal();
        }

        function openProject(index) {
            currentProjectIndex = index;
            const project = projects[index];

            document.getElementById('projectSection').style.display = 'none';
            document.getElementById('welcomeSection').style.display = 'none';
            document.getElementById('editorView').classList.add('active');

            renderChapters();
        }

        function goBack() {
            currentProjectIndex = -1;
            currentChapterIndex = -1;

            document.getElementById('projectSection').style.display = 'block';
            document.getElementById('welcomeSection').style.display = 'flex';
            document.getElementById('editorView').classList.remove('active');

            renderProjects();
            updateStats();
        }

        function addChapter() {
            const title = document.getElementById('chapterTitleInput').value.trim();
            const summary = document.getElementById('chapterDescInput').value.trim();

            if (!title) {
                alert('请输入章节标题');
                return;
            }

            if (currentProjectIndex === -1) return;

            projects[currentProjectIndex].chapters.push({
                title,
                summary,
                content: ''
            });

            saveProjects();
            renderChapters();
            closeAddChapterModal();
            updateStats();
        }

        function renderChapters() {
            const list = document.getElementById('chapterList');
            const project = projects[currentProjectIndex];

            if (!project || project.chapters.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 1rem;">暂无章节</p>';
                return;
            }

            list.innerHTML = project.chapters.map((ch, i) => `
                <div class="chapter-item ${i === currentChapterIndex ? 'active' : ''}" onclick="selectChapter(${i})">
                    第${i + 1}章 · ${ch.title}
                </div>
            `).join('');
        }

        function selectChapter(index) {
            currentChapterIndex = index;
            const project = projects[currentProjectIndex];
            const chapter = project.chapters[index];

            document.getElementById('editorTitle').textContent = `第${index + 1}章 · ${chapter.title}`;
            document.getElementById('contentEditor').value = chapter.content || '';

            renderChapters();
            updateWordCount();
        }

        // Content Editor
        document.getElementById('contentEditor').addEventListener('input', function() {
            if (currentProjectIndex !== -1 && currentChapterIndex !== -1) {
                projects[currentProjectIndex].chapters[currentChapterIndex].content = this.value;
                saveProjects();
                updateWordCount();
            }
        });

        function updateWordCount() {
            const content = document.getElementById('contentEditor').value;
            document.getElementById('currentWordCount').textContent = `${content.length} 字`;
        }

        // AI Functions
        function getThemePrompt(themeType) {
            const prompts = {
                romance: '你是一位专业的言情小说写作助手，擅长细腻的情感描写和人物心理刻画。请用中文回答。',
                fantasy: '你是一位专业的玄幻小说写作助手，擅长构建奇幻世界观和力量体系。请用中文回答。',
                mystery: '你是一位专业的悬疑小说写作助手，擅长铺设悬念和设计推理逻辑。请用中文回答。',
                scifi: '你是一位专业的科幻小说写作助手，擅长设计科技设定和未来场景。请用中文回答。',
                wuxia: '你是一位专业的武侠小说写作助手，擅长描绘江湖规矩和武功招式。请用中文回答。',
                urban: '你是一位专业的都市小说写作助手，擅长描绘现代都市生活。请用中文回答。',
                historical: '你是一位专业的历史小说写作助手，擅长还原时代背景和人物风貌。请用中文回答。',
                horror: '你是一位专业的恐怖小说写作助手，擅长营造恐怖氛围和心理恐惧。请用中文回答。'
            };
            return prompts[themeType] || prompts.romance;
        }

        async function callAI(messages, systemPrompt) {
            if (aiSettings.provider === 'local') {
                return callLocalAI(messages, systemPrompt);
            }

            const headers = {
                'Content-Type': 'application/json'
            };

            let endpoint = '';
            let body = {};

            if (aiSettings.provider === 'anthropic') {
                endpoint = aiSettings.baseUrl || 'https://api.anthropic.com/v1/messages';
                headers['x-api-key'] = aiSettings.apiKey;
                headers['anthropic-version'] = '2023-06-01';
                body = {
                    model: aiSettings.model,
                    max_tokens: aiSettings.maxTokens,
                    system: systemPrompt,
                    messages: messages
                };
            } else if (aiSettings.provider === 'openai') {
                endpoint = aiSettings.baseUrl || 'https://api.openai.com/v1/chat/completions';
                headers['Authorization'] = `Bearer ${aiSettings.apiKey}`;
                body = {
                    model: aiSettings.model,
                    max_tokens: aiSettings.maxTokens,
                    temperature: aiSettings.temperature,
                    messages: [{ role: 'system', content: systemPrompt }, ...messages]
                };
            }

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(body)
                });

                if (!response.ok) {
                    throw new Error('API request failed');
                }

                const data = await response.json();

                if (aiSettings.provider === 'anthropic') {
                    return data.content[0].text;
                } else {
                    return data.choices[0].message.content;
                }
            } catch (error) {
                console.error('AI API Error:', error);
                throw error;
            }
        }

        function callLocalAI(messages, systemPrompt) {
            // Mock AI response for local mode
            return new Promise((resolve) => {
                setTimeout(() => {
                    const lastMessage = messages[messages.length - 1]?.content || '';
                    resolve('【本地模拟】这是一段模拟的AI续写内容。夜风轻拂，星光点点，他望着远方的山峦，心中涌起无限思绪。');
                }, 1000);
            });
        }

        async function aiWrite() {
            if (currentChapterIndex === -1) {
                alert('请先选择一个章节');
                return;
            }
            const content = document.getElementById('contentEditor').value;
            if (!content) {
                alert('请先输入一些内容');
                return;
            }

            showLoading(true);

            try {
                const project = projects[currentProjectIndex];
                const systemPrompt = getThemePrompt(project.type);

                const messages = [{
                    role: 'user',
                    content: `请续写以下小说内容，保持相同的风格和节奏，续写150-300字：\n\n${content}`
                }];

                const continuation = await callAI(messages, systemPrompt);
                document.getElementById('contentEditor').value = content + continuation;
                projects[currentProjectIndex].chapters[currentChapterIndex].content = document.getElementById('contentEditor').value;
                saveProjects();
                updateWordCount();
            } catch (error) {
                alert('AI调用失败，请检查API设置');
            }

            showLoading(false);
        }

        async function aiPolish() {
            if (currentChapterIndex === -1) {
                alert('请先选择一个章节');
                return;
            }
            const content = document.getElementById('contentEditor').value;
            if (!content) {
                alert('请先输入内容');
                return;
            }

            showLoading(true);

            try {
                const project = projects[currentProjectIndex];
                const systemPrompt = '你是一位专业的中文写作润色专家，擅长优化文字表达，使其更加流畅、生动、有文采。请直接返回润色后的内容，不要添加解释性文字。';

                const messages = [{
                    role: 'user',
                    content: `请润色以下内容：\n\n${content}`
                }];

                const polished = await callAI(messages, systemPrompt);
                document.getElementById('contentEditor').value = polished;
                projects[currentProjectIndex].chapters[currentChapterIndex].content = polished;
                saveProjects();
                updateWordCount();
            } catch (error) {
                alert('AI调用失败，请检查API设置');
            }

            showLoading(false);
        }

        async function aiImprove() {
            if (currentChapterIndex === -1) {
                alert('请先选择一个章节');
                return;
            }
            const content = document.getElementById('contentEditor').value;
            if (!content) {
                alert('请先输入内容');
                return;
            }

            showLoading(true);

            try {
                const project = projects[currentProjectIndex];
                const systemPrompt = getThemePrompt(project.type);

                const messages = [{
                    role: 'user',
                    content: `请为以下小说内容提供改进建议，从情节、人物描写、节奏、对话等方面给出具体建议：\n\n${content.slice(0, 500)}`
                }];

                const suggestion = await callAI(messages, systemPrompt);
                alert('💡 AI改进建议：\n\n' + suggestion);
            } catch (error) {
                alert('AI调用失败，请检查API设置');
            }

            showLoading(false);
        }

        function showLoading(show) {
            const btn = event?.target?.closest('.toolbar-btn') || document.querySelector('.toolbar-btn.primary');
            if (show) {
                btn.textContent = '⏳ AI思考中...';
                btn.disabled = true;
            } else {
                btn.textContent = '✍️ AI续写';
                btn.disabled = false;
            }
        }

        // Auto-save
        setInterval(() => {
            if (projects.length > 0) {
                saveProjects();
            }
        }, 30000);

        // Init
        init();
    </script>
</body>
</html>
