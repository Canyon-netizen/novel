<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨韵AI - 智能小说创作</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">📝</div>
            <span class="brand-name">墨韵AI</span>
            <span class="brand-sub">智能创作工作台</span>
        </div>
        <div class="header-right">
            <button class="settings-btn" onclick="openSettingsModal()" title="设置">⚙️</button>
            <select class="theme-select" onchange="toggleTheme()">
                <option value="dark">暗色系</option>
                <option value="light">亮色系</option>
            </select>
            <div class="user-info">
                <div class="user-avatar">Y</div>
                <span class="user-name">yyy</span>
            </div>
            <span class="logout-icon">↩</span>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Welcome Section -->
        <section class="welcome-section" id="welcomeSection">
            <div class="welcome-text">
                <h1 id="greetingText">晚上好，yyy</h1>
                <p>开始你的创作之旅吧！让AI陪你完成你的小说作品。</p>
            </div>
            <button class="btn-primary" onclick="openNewNovelModal()">
                <span>+</span> 新建小说
            </button>
        </section>

        <!-- Stats Section -->
        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-icon purple">📚</div>
                <div class="stat-info">
                    <h3 id="novelCount">0</h3>
                    <p>小说项目</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon teal">📖</div>
                <div class="stat-info">
                    <h3 id="chapterCount">0</h3>
                    <p>总章节</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon gold">✍️</div>
                <div class="stat-info">
                    <h3 id="wordCount">0</h3>
                    <p>总字数</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon pink">👥</div>
                <div class="stat-info">
                    <h3 id="charCount">0</h3>
                    <p>总角色</p>
                </div>
            </div>
        </section>

        <!-- Project Section - Dashboard View -->
        <section class="project-section" id="projectSection">
            <div class="project-header">
                <h2 class="project-title">我的小说 <span id="projectCount">(0)</span></h2>
                <div class="project-toolbar">
                    <button class="toolbar-btn" onclick="toggleSearch()">
                        <span>🔍</span> 搜索
                    </button>
                    <button class="toolbar-btn" onclick="toggleFilter('type')">
                        <span>📁</span> 类型
                    </button>
                    <button class="toolbar-btn" onclick="toggleFilter('time')">
                        <span>📅</span> 时间
                    </button>
                    <button class="toolbar-btn active" id="gridViewBtn" onclick="setView('grid')">
                        <span>⊞</span>
                    </button>
                    <button class="toolbar-btn" id="listViewBtn" onclick="setView('list')">
                        <span>☰</span>
                    </button>
                    <button class="new-btn" onclick="openNewNovelModal()">
                        <span>+</span> 新建
                    </button>
                </div>
            </div>

            <!-- Search Bar -->
            <div id="searchBar" style="display: none; margin-bottom: 1rem;">
                <input type="text" class="form-input" id="searchInput" placeholder="搜索小说标题或简介..." oninput="filterProjects()">
            </div>

            <!-- Filter Panel -->
            <div id="filterPanel" style="display: none; margin-bottom: 1rem; padding: 1rem; background: var(--bg-secondary); border-radius: 8px;">
                <div id="filterContent"></div>
            </div>

            <div class="novel-grid" id="novelGrid">
                <!-- Novel cards will be rendered here -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📚</div>
                <h3>还没有创建小说项目</h3>
                <p>开始创作你的第一部小说作品吧</p>
                <button class="btn-primary" onclick="openNewNovelModal()">
                    开始创作
                </button>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      更新了些新BUG，额....是新功能 ✨
    </footer>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h3 class="modal-title">⚙️ AI设置</h3>

            <div class="form-group">
                <label class="form-label">API 格式类型</label>
                <select class="form-select" id="apiProvider" onchange="onApiProviderChange()">
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="openai">OpenAI (GPT)</option>
                    <option value="custom">自定义 API</option>
                    <option value="local">本地模拟</option>
                </select>
            </div>

            <div class="form-group" id="apiKeyGroup">
                <label class="form-label">API Key</label>
                <input type="password" class="form-input" id="apiKeyInput" placeholder="请输入API Key">
            </div>

            <div class="form-group" id="baseUrlGroup">
                <label class="form-label">Base URL</label>
                <input type="text" class="form-input" id="baseUrlInput" placeholder="https://api.anthropic.com">
            </div>

            <div class="form-group" id="modelGroup">
                <label class="form-label">Model</label>
                <input type="text" class="form-input" id="modelInput" placeholder="输入模型名称，如：claude-sonnet-4-20250514">
            </div>

            <div class="form-group">
                <label class="form-label">Temperature</label>
                <input type="range" class="form-input" id="temperatureInput" value="0.7" min="0" max="1" step="0.1" style="padding: 0;">
                <span id="temperatureValue" style="color: var(--text-secondary); font-size: 0.85rem; margin-left: 0.5rem;">0.7</span>
            </div>

            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeSettingsModal()">取消</button>
                <button class="modal-btn confirm" id="testBtn" onclick="testApiConnection()">测试连接</button>
                <button class="modal-btn confirm" onclick="saveSettings()">保存</button>
            </div>

            <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border-color);">
                <h4 style="font-size:1rem;margin-bottom:1rem;">☁️ GitHub Gist 同步</h4>

                <div class="form-group">
                    <label class="form-label">GitHub Personal Access Token</label>
                    <input type="password" class="form-input" id="githubTokenInput" placeholder="请输入 GitHub Token">
                    <p style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem;">
                        需要勾选 gist 权限 <a href="https://github.com/settings/tokens/new?scopes=gist" target="_blank" style="color:var(--accent-blue);">创建 Token</a>
                    </p>
                </div>

                <div id="gistStatus" style="margin-bottom:1rem;font-size:0.85rem;display:none;">
                    <span id="gistStatusText" style="color:var(--accent-teal);"></span>
                </div>

                <div class="modal-actions">
                    <button class="modal-btn cancel" onclick="connectGist()">连接/更新 Gist</button>
                    <button class="modal-btn confirm" id="syncBtn" onclick="syncToGist()" disabled>同步数据</button>
                </div>
                <div style="margin-top:0.5rem;text-align:right;">
                    <button class="toolbar-btn" onclick="loadFromGist()" style="font-size:0.8rem;padding:0.4rem 0.8rem;" id="loadFromGistBtn">从 Gist 加载</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
