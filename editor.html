<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F8F6F1" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1A1815" media="(prefers-color-scheme: dark)">
    <title>一页 - 章节编辑</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="page-header">
        <a href="index.html" class="page-logo">
            <div class="page-logo__dot">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>
            <span>一页</span>
        </a>
        <div class="page-header__right">
            <a href="index.html" class="header-back-btn">返回</a>
            <button class="settings-btn" onclick="openSettingsModal()" title="设置" aria-label="设置">⚙</button>
            <div id="themeToggle"></div>
            <div class="user-info">
                <div class="user-avatar"></div>
                <span class="user-name"></span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Editor View -->
        <section class="editor-view active" id="editorView">
            <div class="editor-header">
                <div class="back-btn" onclick="goBack()">
                    <span>←</span> 返回
                </div>
                <h2 class="editor-title" id="editorTitle">第1章 · 章节标题</h2>
                <div class="editor-actions">
                    <button class="action-btn" onclick="saveCurrentChapter()">
                        保存
                    </button>
                    <button class="action-btn" onclick="exportCurrentProject()">
                        导出
                    </button>
                </div>
            </div>

            <div class="editor-container">
                <aside class="chapter-sidebar" id="chapterSidebar">
                <div class="sidebar-tabs">
                    <button class="sidebar-tab-icon active" data-tab="chapters" onclick="switchSidebarTab('chapters')" title="章节" aria-label="章节">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16v16H4z"/><line x1="8" y1="9" x2="16" y2="9"/></svg>
                        <span class="sidebar-tab-label">章节</span>
                    </button>
                    <button class="sidebar-tab-icon" data-tab="characters" onclick="switchSidebarTab('characters')" title="角色" aria-label="角色">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="7" r="4"/><path d="M4 21v-2a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v2"/></svg>
                        <span class="sidebar-tab-label">角色</span>
                    </button>
                    <button class="sidebar-tab-icon" data-tab="world" onclick="switchSidebarTab('world')" title="世界" aria-label="世界">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a13 13 0 0 1 0 18M12 3a13 13 0 0 0 0 18"/></svg>
                        <span class="sidebar-tab-label">世界</span>
                    </button>
                    <button class="sidebar-tab-icon" data-tab="timeline" onclick="switchSidebarTab('timeline')" title="时间" aria-label="时间">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
                        <span class="sidebar-tab-label">时间</span>
                    </button>
                    <button class="sidebar-tab-icon" data-tab="outline" onclick="switchSidebarTab('outline')" title="大纲" aria-label="大纲">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                        <span class="sidebar-tab-label">大纲</span>
                    </button>
                </div>

                <div class="sidebar-content-wrap" id="sidebarContent">
                <!-- Chapter List -->
                <div class="sidebar-content active" id="chaptersTab">
                    <div class="chapter-list" id="chapterList">
                        <!-- Chapter items will be rendered here -->
                    </div>
                    <button class="add-chapter-btn" onclick="openAddChapterModal()">
                        <span>+</span> 添加章节
                    </button>
                </div>

                <!-- Character List -->
                <div class="sidebar-content" id="charactersTab">
                    <div class="character-list" id="characterList">
                        <!-- Character items will be rendered here -->
                    </div>
                    <button class="add-character-btn" onclick="openAddCharacterModal()">
                        <span>+</span> 添加角色
                    </button>
                </div>

                <!-- World Setting -->
                <div class="sidebar-content" id="worldTab">
                    <div class="world-setting" id="worldSetting">
                        <div class="world-form-group">
                            <label>时代背景</label>
                            <input type="text" id="worldEra" class="form-input" placeholder="如：唐朝、明朝、现代">
                        </div>
                        <div class="world-form-group">
                            <label>社会环境</label>
                            <input type="text" id="worldSociety" class="form-input" placeholder="如：江湖朝堂、都市职场">
                        </div>
                        <div class="world-form-group">
                            <label>地理设定</label>
                            <textarea id="worldGeography" class="form-input" rows="2" placeholder="描述主要地理环境"></textarea>
                        </div>
                        <div class="world-form-group">
                            <label>特殊规则</label>
                            <textarea id="worldRules" class="form-input" rows="3" placeholder="如：魔法体系、武林秘籍、异能等级"></textarea>
                        </div>
                        <button class="save-world-btn" onclick="saveWorldSetting()">保存世界观</button>
                    </div>
                </div>

                <!-- Timeline -->
                <div class="sidebar-content" id="timelineTab">
                    <div class="timeline-container" id="timelineContainer">
                        <div class="timeline-events" id="timelineEvents">
                            <!-- Timeline events will be rendered here -->
                        </div>
                    </div>
                    <button class="add-event-btn" onclick="openAddTimelineEventModal()">
                        <span>+</span> 添加时间节点
                    </button>
                </div>

                <!-- Outline / Chapter Plan -->
                <div class="sidebar-content" id="outlineTab">
                    <div class="batch-card" id="batchCard">
                        <div class="batch-card-label">AI 批量写作</div>
                        <div class="batch-card-body" id="batchCardBody">基于本章大纲,AI 可一次性按顺序生成所有章节。点击"试写 2 章"先看看效果,满意再一键全量生成。</div>
                        <div class="batch-card-actions" id="batchCardActions">
                            <button class="toolbar-btn primary" data-batch="sample">试写 2 章</button>
                        </div>
                    </div>
                    <div class="outline-current" id="outlineCurrent">
                        <div class="outline-current-label">当前章节大纲</div>
                        <div class="outline-current-title" id="outlineCurrentTitle">第1章</div>
                        <div class="outline-current-summary" id="outlineCurrentSummary">暂无大纲 — 可点击下方「AI 规划大纲」自动生成</div>
                    </div>
                    <div class="outline-list" id="outlineList">
                        <!-- All chapter outlines rendered here -->
                    </div>
                </div>
                </div>
            </aside>

                <div class="content-area">
                    <textarea class="content-textarea" id="contentEditor" placeholder="在这里开始你的创作..."></textarea>
                    <div class="content-toolbar">
                        <button class="toolbar-btn primary" onclick="aiWrite()">
                            AI 续写
                        </button>
                        <button class="toolbar-btn secondary-plan" onclick="aiPlanOutline()" title="为全部章节生成大纲" aria-label="AI 规划大纲">
                            AI 规划大纲
                        </button>
                        <button class="toolbar-btn" onclick="aiPolish()">
                            AI 润色
                        </button>
                        <button class="toolbar-btn" onclick="aiImprove()">
                            AI 建议
                        </button>
                    </div>
                    <div class="word-count-bar">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <span id="currentWordCount">0 字</span>
                            <span id="saveStatus" class="save-status"></span>
                            <span class="ai-status" id="aiStatus"></span>
                        </div>
                        <span>自动保存已开启</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      &nbsp;
    </footer>

    <!-- Add Chapter Modal -->
    <div class="modal-overlay" id="addChapterModal">
        <div class="modal">
            <div class="modal-title-row">
                <h3 class="modal-title">添加章节</h3>
                <button class="modal-x" onclick="closeAddChapterModal()" aria-label="关闭">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">章节标题</label>
                <input type="text" class="form-input" id="chapterTitleInput" placeholder="请输入章节标题">
            </div>
            <div class="form-group">
                <label class="form-label">章节简介（可选）</label>
                <textarea class="form-input" id="chapterDescInput" placeholder="请输入章节简介" rows="2"></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeAddChapterModal()">取消</button>
                <button class="modal-btn confirm" onclick="addChapter()">添加</button>
            </div>
        </div>
    </div>

    <!-- Add Character Modal -->
    <div class="modal-overlay" id="addCharacterModal">
        <div class="modal">
            <div class="modal-title-row">
                <h3 class="modal-title">添加角色</h3>
                <button class="modal-x" onclick="closeAddCharacterModal()" aria-label="关闭">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">角色名称</label>
                <input type="text" class="form-input" id="characterNameInput" placeholder="请输入角色名称">
            </div>
            <div class="form-group">
                <label class="form-label">角色身份</label>
                <input type="text" class="form-input" id="characterRoleInput" placeholder="如：主角、配角、反派">
            </div>
            <div class="form-group">
                <label class="form-label">角色简介</label>
                <textarea class="form-input" id="characterDescInput" placeholder="描述角色外貌、性格、背景..." rows="3"></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeAddCharacterModal()">取消</button>
                <button class="modal-btn confirm" onclick="addCharacter()">添加</button>
            </div>
        </div>
    </div>

    <!-- Edit Character Modal -->
    <div class="modal-overlay" id="editCharacterModal">
        <div class="modal">
            <div class="modal-title-row">
                <h3 class="modal-title">编辑角色</h3>
                <button class="modal-x" onclick="closeEditCharacterModal()" aria-label="关闭">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">角色名称</label>
                <input type="text" class="form-input" id="editCharacterNameInput">
            </div>
            <div class="form-group">
                <label class="form-label">角色身份</label>
                <input type="text" class="form-input" id="editCharacterRoleInput">
            </div>
            <div class="form-group">
                <label class="form-label">角色简介</label>
                <textarea class="form-input" id="editCharacterDescInput" rows="3"></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeEditCharacterModal()">取消</button>
                <button class="modal-btn confirm" onclick="saveCharacter()">保存</button>
            </div>
        </div>
    </div>

    <!-- Add Timeline Event Modal -->
    <div class="modal-overlay" id="addTimelineEventModal">
        <div class="modal">
            <div class="modal-title-row">
                <h3 class="modal-title">添加时间节点</h3>
                <button class="modal-x" onclick="closeAddTimelineEventModal()" aria-label="关闭">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">事件名称</label>
                <input type="text" class="form-input" id="eventTitleInput" placeholder="如：主角出生">
            </div>
            <div class="form-group">
                <label class="form-label">发生时间</label>
                <input type="text" class="form-input" id="eventTimeInput" placeholder="如：第一章后3年">
            </div>
            <div class="form-group">
                <label class="form-label">事件描述</label>
                <textarea class="form-input" id="eventDescInput" rows="3" placeholder="描述这个时间节点发生的事件"></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeAddTimelineEventModal()">取消</button>
                <button class="modal-btn confirm" onclick="addTimelineEvent()">添加</button>
            </div>
        </div>
    </div>

    <!-- Reading Mode Modal -->
    <div class="modal-overlay" id="readingModeModal">
        <div class="modal reading-mode-content">
            <div class="modal-title-row">
                <h3 class="modal-title" id="readingModeTitle">阅读模式</h3>
                <button class="modal-x" onclick="closeReadingMode()" aria-label="关闭">&times;</button>
            </div>
            <div class="reading-mode-body" id="readingModeBody"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h3 class="modal-title">⚙️ AI设置</h3>

            <div class="form-group">
                <label class="form-label">API Provider</label>
                <select class="form-select" id="apiProvider" onchange="onApiProviderChange()">
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="openai">OpenAI (GPT)</option>
                    <option value="deepseek">DeepSeek</option>
                    <option value="minimax">MiniMax</option>
                    <option value="custom">自定义 API</option>
                    <option value="local">本地模拟</option>
                </select>
            </div>

            <div class="form-group" id="apiKeyGroup">
                <label class="form-label">API Key</label>
                <input type="password" class="form-input" id="apiKeyInput" placeholder="请输入API Key">
            </div>

            <div class="form-group" id="baseUrlGroup">
                <label class="form-label">Base URL</label>
                <input type="text" class="form-input" id="baseUrlInput" placeholder="https://api.anthropic.com">
            </div>

            <div class="form-group" id="modelGroup">
                <label class="form-label">Model</label>
                <input type="text" class="form-input" id="modelInput" placeholder="输入模型名称，如：claude-sonnet-4-20250514">
            </div>

            <div class="form-group">
                <label class="form-label">Max Tokens</label>
                <input type="number" class="form-input" id="maxTokensInput" value="2048" min="256" max="8192">
            </div>

            <div class="form-group">
                <label class="form-label">Temperature</label>
                <input type="range" class="form-input" id="temperatureInput" value="0.7" min="0" max="1" step="0.1" style="padding: 0;">
                <span id="temperatureValue" style="color: var(--text-secondary); font-size: 0.85rem; margin-left: 0.5rem;">0.7</span>
            </div>

            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeSettingsModal()">取消</button>
                <button class="modal-btn confirm" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </div>

    <script src="app/common.js"></script>
    <script src="app/modals.js"></script>
    <script src="app/llm-client.js"></script>
    <script src="app/autosave.js"></script>
    <script src="app/undo-stack.js"></script>
    <script src="app/writing-stats.js"></script>
    <script src="app/inspiration.js"></script>
    <script src="app/exporter.js"></script>
    <script src="app/settings-test.js"></script>
    <script src="js/editor-integration.js"></script>
<script src="js/theme-toggle.js"></script>
    <script src="js/states.js"></script>
    <script src="js/shortcuts.js"></script>
    <script src="js/auto-sync.js"></script>
    <script src="js/editor.js?v=20260623"></script>
</body>
</html>
