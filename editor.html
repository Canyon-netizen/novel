<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨韵AI - 章节编辑</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">📝</div>
            <span class="brand-name">墨韵AI</span>
            <span class="brand-sub">智能创作工作台</span>
        </div>
        <div class="header-right">
            <button class="settings-btn" onclick="openSettingsModal()" title="设置">⚙️</button>
            <select class="theme-select" onchange="toggleTheme()">
                <option value="dark">暗色系</option>
                <option value="light">亮色系</option>
            </select>
            <div class="user-info">
                <div class="user-avatar">Y</div>
                <span class="user-name">yyy</span>
            </div>
            <span class="logout-icon">↩</span>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Editor View -->
        <section class="editor-view active" id="editorView">
            <div class="editor-header">
                <div class="back-btn" onclick="goBack()">
                    <span>←</span> 返回
                </div>
                <h2 class="editor-title" id="editorTitle">第1章 · 章节标题</h2>
                <div class="editor-actions">
                    <button class="action-btn" onclick="saveCurrentChapter()">
                        <span>💾</span> 保存
                    </button>
                    <button class="action-btn" onclick="exportCurrentProject()">
                        <span>📤</span> 导出
                    </button>
                </div>
            </div>

            <div class="editor-container">
                <aside class="chapter-sidebar">
                    <h3>章节目录</h3>
                    </div>

                <!-- Tab Navigation for Sidebar -->
                <div class="sidebar-tabs">
                    <button class="sidebar-tab active" data-tab="chapters" onclick="switchSidebarTab('chapters')">📖 章节</button>
                    <button class="sidebar-tab" data-tab="characters" onclick="switchSidebarTab('characters')">👥 角色</button>
                    <button class="sidebar-tab" data-tab="world" onclick="switchSidebarTab('world')">🌍 世界</button>
                    <button class="sidebar-tab" data-tab="timeline" onclick="switchSidebarTab('timeline')">⏱️ 时间</button>
                </div>

                <!-- Chapter List -->
                <div class="sidebar-content active" id="chaptersTab">
                    <div class="chapter-list" id="chapterList">
                        <!-- Chapter items will be rendered here -->
                    </div>
                    <button class="add-chapter-btn" onclick="openAddChapterModal()">
                        <span>+</span> 添加章节
                    </button>
                </div>

                <!-- Character List -->
                <div class="sidebar-content" id="charactersTab">
                    <div class="character-list" id="characterList">
                        <!-- Character items will be rendered here -->
                    </div>
                    <button class="add-character-btn" onclick="openAddCharacterModal()">
                        <span>+</span> 添加角色
                    </button>
                </div>

                <!-- World Setting -->
                <div class="sidebar-content" id="worldTab">
                    <div class="world-setting" id="worldSetting">
                        <div class="world-form-group">
                            <label>时代背景</label>
                            <input type="text" id="worldEra" class="form-input" placeholder="如：唐朝、明朝、现代">
                        </div>
                        <div class="world-form-group">
                            <label>社会环境</label>
                            <input type="text" id="worldSociety" class="form-input" placeholder="如：江湖朝堂、都市职场">
                        </div>
                        <div class="world-form-group">
                            <label>地理设定</label>
                            <textarea id="worldGeography" class="form-input" rows="2" placeholder="描述主要地理环境"></textarea>
                        </div>
                        <div class="world-form-group">
                            <label>特殊规则</label>
                            <textarea id="worldRules" class="form-input" rows="3" placeholder="如：魔法体系、武林秘籍、异能等级"></textarea>
                        </div>
                        <button class="save-world-btn" onclick="saveWorldSetting()">保存世界观</button>
                    </div>
                </div>

                <!-- Timeline -->
                <div class="sidebar-content" id="timelineTab">
                    <div class="timeline-container" id="timelineContainer">
                        <div class="timeline-events" id="timelineEvents">
                            <!-- Timeline events will be rendered here -->
                        </div>
                    </div>
                    <button class="add-event-btn" onclick="openAddTimelineEventModal()">
                        <span>+</span> 添加时间节点
                    </button>
                </div>
            </aside>

                <div class="content-area">
                    <textarea class="content-textarea" id="contentEditor" placeholder="在这里开始你的创作..."></textarea>
                    <div class="content-toolbar">
                        <button class="toolbar-btn primary" onclick="aiWrite()">
                            ✍️ AI续写
                        </button>
                        <button class="toolbar-btn" onclick="aiPolish()">
                            🎨 AI润色
                        </button>
                        <button class="toolbar-btn" onclick="aiImprove()">
                            💡 AI建议
                        </button>
                    </div>
                    <div class="word-count-bar">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <span id="currentWordCount">0 字</span>
                            <span class="ai-status" id="aiStatus"></span>
                        </div>
                        <span>自动保存已开启</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      更新了些新BUG，额....是新功能 ✨
    </footer>

    <!-- Add Chapter Modal -->
    <div class="modal-overlay" id="addChapterModal">
        <div class="modal">
            <h3 class="modal-title">添加章节</h3>
            <div class="form-group">
                <label class="form-label">章节标题</label>
                <input type="text" class="form-input" id="chapterTitleInput" placeholder="请输入章节标题">
            </div>
            <div class="form-group">
                <label class="form-label">章节简介（可选）</label>
                <textarea class="form-input" id="chapterDescInput" placeholder="请输入章节简介" rows="2"></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeAddChapterModal()">取消</button>
                <button class="modal-btn confirm" onclick="addChapter()">添加</button>
            </div>
        </div>
    </div>

    <!-- Add Character Modal -->
    <div class="modal-overlay" id="addCharacterModal">
        <div class="modal">
            <h3 class="modal-title">添加角色</h3>
            <div class="form-group">
                <label class="form-label">角色名称</label>
                <input type="text" class="form-input" id="characterNameInput" placeholder="请输入角色名称">
            </div>
            <div class="form-group">
                <label class="form-label">角色身份</label>
                <input type="text" class="form-input" id="characterRoleInput" placeholder="如：主角、配角、反派">
            </div>
            <div class="form-group">
                <label class="form-label">角色简介</label>
                <textarea class="form-input" id="characterDescInput" placeholder="描述角色外貌、性格、背景..." rows="3"></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeAddCharacterModal()">取消</button>
                <button class="modal-btn confirm" onclick="addCharacter()">添加</button>
            </div>
        </div>
    </div>

    <!-- Edit Character Modal -->
    <div class="modal-overlay" id="editCharacterModal">
        <div class="modal">
            <h3 class="modal-title">编辑角色</h3>
            <div class="form-group">
                <label class="form-label">角色名称</label>
                <input type="text" class="form-input" id="editCharacterNameInput">
            </div>
            <div class="form-group">
                <label class="form-label">角色身份</label>
                <input type="text" class="form-input" id="editCharacterRoleInput">
            </div>
            <div class="form-group">
                <label class="form-label">角色简介</label>
                <textarea class="form-input" id="editCharacterDescInput" rows="3"></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeEditCharacterModal()">取消</button>
                <button class="modal-btn confirm" onclick="saveCharacter()">保存</button>
            </div>
        </div>
    </div>

    <!-- Add Timeline Event Modal -->
    <div class="modal-overlay" id="addTimelineEventModal">
        <div class="modal">
            <h3 class="modal-title">添加时间节点</h3>
            <div class="form-group">
                <label class="form-label">事件名称</label>
                <input type="text" class="form-input" id="eventTitleInput" placeholder="如：主角出生">
            </div>
            <div class="form-group">
                <label class="form-label">发生时间</label>
                <input type="text" class="form-input" id="eventTimeInput" placeholder="如：第一章后3年">
            </div>
            <div class="form-group">
                <label class="form-label">事件描述</label>
                <textarea class="form-input" id="eventDescInput" rows="3" placeholder="描述这个时间节点发生的事件"></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeAddTimelineEventModal()">取消</button>
                <button class="modal-btn confirm" onclick="addTimelineEvent()">添加</button>
            </div>
        </div>
    </div>

    <!-- Reading Mode Modal -->
    <div class="modal-overlay" id="readingModeModal">
        <div class="modal reading-mode-content">
            <div class="reading-mode-header">
                <h3 class="modal-title" id="readingModeTitle">阅读模式</h3>
                <button class="modal-btn cancel" onclick="closeReadingMode()">关闭</button>
            </div>
            <div class="reading-mode-body" id="readingModeBody"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h3 class="modal-title">⚙️ AI设置</h3>

            <div class="form-group">
                <label class="form-label">API Provider</label>
                <select class="form-select" id="apiProvider" onchange="onApiProviderChange()">
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="openai">OpenAI (GPT)</option>
                    <option value="deepseek">DeepSeek</option>
                    <option value="minimax">MiniMax</option>
                    <option value="custom">自定义 API</option>
                    <option value="local">本地模拟</option>
                </select>
            </div>

            <div class="form-group" id="apiKeyGroup">
                <label class="form-label">API Key</label>
                <input type="password" class="form-input" id="apiKeyInput" placeholder="请输入API Key">
            </div>

            <div class="form-group" id="baseUrlGroup">
                <label class="form-label">Base URL</label>
                <input type="text" class="form-input" id="baseUrlInput" placeholder="https://api.anthropic.com">
            </div>

            <div class="form-group" id="modelGroup">
                <label class="form-label">Model</label>
                <input type="text" class="form-input" id="modelInput" placeholder="输入模型名称，如：claude-sonnet-4-20250514">
            </div>

            <div class="form-group">
                <label class="form-label">Max Tokens</label>
                <input type="number" class="form-input" id="maxTokensInput" value="2048" min="256" max="8192">
            </div>

            <div class="form-group">
                <label class="form-label">Temperature</label>
                <input type="range" class="form-input" id="temperatureInput" value="0.7" min="0" max="1" step="0.1" style="padding: 0;">
                <span id="temperatureValue" style="color: var(--text-secondary); font-size: 0.85rem; margin-left: 0.5rem;">0.7</span>
            </div>

            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeSettingsModal()">取消</button>
                <button class="modal-btn confirm" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </div>

    <script src="js/editor.js"></script>
</body>
</html>
