name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build artifact
        run: |
          mkdir -p _site
          # 复制所有前端 HTML 入口到 _site
          cp index.html _site/
          cp login.html _site/
          cp create.html _site/
          cp editor.html _site/
          cp -r css _site/
          cp -r app _site/
          cp -r js _site/
          # 后端 src/ 不部署（GitHub Pages 是静态服务）
          # README/SPEC 也不在 _site（避免覆盖 index.html）

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
